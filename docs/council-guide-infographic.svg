<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1754" viewBox="0 0 1240 1754" font-family="'Noto Sans Thai','Sarabun','Garuda','Loma','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bgHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F3D2E"/>
      <stop offset="1" stop-color="#1F6E4A"/>
    </linearGradient>
    <linearGradient id="stepNum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1F6E4A"/>
      <stop offset="1" stop-color="#3FA66B"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F3D2E" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- page -->
  <rect width="1240" height="1754" fill="#FAF7EE"/>

  <!-- header -->
  <rect width="1240" height="300" fill="url(#bgHead)"/>
  <circle cx="120" cy="120" r="54" fill="#C8E6D2"/>
  <text x="120" y="142" font-size="56" text-anchor="middle">♻️</text>
  <text x="210" y="110" font-size="52" font-weight="800" fill="#FFFFFF">Botty · คู่มือเจ้าหน้าที่</text>
  <text x="212" y="160" font-size="30" font-weight="600" fill="#C8E6D2">COUNCIL GUIDE — ยืนยันการสแกนของนักเรียนด้วย QR เจ้าหน้าที่</text>

  <!-- role chips -->
  <g transform="translate(210,205)">
    <rect x="0" y="0" rx="20" ry="20" width="180" height="56" fill="#1A2620" opacity="0.35"/>
    <text x="90" y="37" font-size="26" font-weight="700" fill="#C8E6D2" text-anchor="middle">student</text>
    <text x="200" y="37" font-size="30" fill="#C8E6D2" text-anchor="middle">→</text>
    <rect x="232" y="-4" rx="22" ry="22" width="190" height="64" fill="#D9A441"/>
    <text x="327" y="37" font-size="28" font-weight="800" fill="#0F3D2E" text-anchor="middle">council ★</text>
    <text x="450" y="37" font-size="30" fill="#C8E6D2" text-anchor="middle">→</text>
    <rect x="482" y="0" rx="20" ry="20" width="150" height="56" fill="#1A2620" opacity="0.35"/>
    <text x="557" y="37" font-size="26" font-weight="700" fill="#C8E6D2" text-anchor="middle">admin</text>
  </g>

  <!-- your job card -->
  <g transform="translate(60,340)" filter="url(#soft)">
    <rect width="1120" height="150" rx="22" fill="#FFFFFF" stroke="#C8E6D2"/>
    <rect width="14" height="150" rx="7" fill="#3FA66B"/>
    <text x="48" y="58" font-size="30" font-weight="800" fill="#0F3D2E">หน้าที่ของคุณ · YOUR JOB</text>
    <text x="48" y="100" font-size="25" fill="#1A2620">นักเรียนสแกนขวด → AI ตรวจ → คะแนน "ค้างไว้" จนกว่านักเรียนจะสแกน QR ของคุณ</text>
    <text x="48" y="134" font-size="25" fill="#637068">คุณคือคนยืนยัน — โชว์ QR เจ้าหน้าที่ แล้วคะแนนของนักเรียนจะถูกปลดล็อก</text>
  </g>

  <!-- steps heading -->
  <text x="60" y="560" font-size="34" font-weight="800" fill="#0F3D2E">4 ขั้นตอน · HOW TO RUN THE QR</text>

  <!-- step 1 -->
  <g transform="translate(60,590)" filter="url(#soft)">
    <rect width="1120" height="170" rx="22" fill="#FFFFFF" stroke="#C8E6D2"/>
    <circle cx="92" cy="85" r="46" fill="url(#stepNum)"/>
    <text x="92" y="100" font-size="44" font-weight="800" fill="#FFFFFF" text-anchor="middle">1</text>
    <text x="170" y="68" font-size="56">📲</text>
    <text x="250" y="74" font-size="30" font-weight="800" fill="#1A2620">เปิดแอปในไลน์ → หน้าหลัก</text>
    <text x="250" y="118" font-size="25" fill="#637068">กดปุ่มสีเขียว "QR เจ้าหน้าที่ 🔳" (ขึ้นเฉพาะบัญชี council/admin)</text>
    <text x="250" y="152" font-size="22" fill="#9AA8A0">หน้า /home → /approver</text>
  </g>

  <!-- step 2 -->
  <g transform="translate(60,780)" filter="url(#soft)">
    <rect width="1120" height="170" rx="22" fill="#FFFFFF" stroke="#C8E6D2"/>
    <circle cx="92" cy="85" r="46" fill="url(#stepNum)"/>
    <text x="92" y="100" font-size="44" font-weight="800" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="170" y="68" font-size="56">▶️</text>
    <text x="250" y="74" font-size="30" font-weight="800" fill="#1A2620">กด "เปิด QR เจ้าหน้าที่"</text>
    <text x="250" y="118" font-size="25" fill="#637068">ระบบสร้าง QR ให้อัตโนมัติ — ไม่ต้องตั้งค่าอะไร</text>
    <text x="250" y="152" font-size="22" fill="#9AA8A0">เริ่มเซสชัน 1 ครั้ง โชว์ได้ทั้งคาบ</text>
  </g>

  <!-- step 3 -->
  <g transform="translate(60,970)" filter="url(#soft)">
    <rect width="1120" height="170" rx="22" fill="#FFFFFF" stroke="#C8E6D2"/>
    <circle cx="92" cy="85" r="46" fill="url(#stepNum)"/>
    <text x="92" y="100" font-size="44" font-weight="800" fill="#FFFFFF" text-anchor="middle">3</text>
    <text x="170" y="68" font-size="56">📱</text>
    <text x="250" y="74" font-size="30" font-weight="800" fill="#1A2620">โชว์ QR ให้นักเรียนสแกน</text>
    <text x="250" y="118" font-size="25" fill="#637068">QR เปลี่ยนเองทุก 5 นาที · นักเรียนหลายคนสแกนรับคะแนนได้</text>
    <text x="250" y="152" font-size="22" fill="#9AA8A0">หน้าจอบอกจำนวนครั้งที่ให้คะแนนแล้ว + นับถอยหลังก่อน QR เปลี่ยน</text>
  </g>

  <!-- step 4 -->
  <g transform="translate(60,1160)" filter="url(#soft)">
    <rect width="1120" height="170" rx="22" fill="#FFFFFF" stroke="#C8E6D2"/>
    <circle cx="92" cy="85" r="46" fill="url(#stepNum)"/>
    <text x="92" y="100" font-size="44" font-weight="800" fill="#FFFFFF" text-anchor="middle">4</text>
    <text x="170" y="68" font-size="56">⏹️</text>
    <text x="250" y="74" font-size="30" font-weight="800" fill="#1A2620">กด "ปิด QR" เมื่อเลิกใช้</text>
    <text x="250" y="118" font-size="25" fill="#637068">ปิดเซสชันทุกครั้งเมื่อเสร็จ เพื่อกัน QR ค้างถูกนำไปใช้ต่อ</text>
    <text x="250" y="152" font-size="22" fill="#9AA8A0">เซสชันหมดเวลาเองได้ — ถ้าเจอ "เซสชันหมดเวลา" กด "เปิดใหม่"</text>
  </g>

  <!-- tips -->
  <g transform="translate(60,1360)" filter="url(#soft)">
    <rect width="1120" height="230" rx="22" fill="#0F3D2E"/>
    <text x="48" y="62" font-size="30" font-weight="800" fill="#FFFFFF">เคล็ดลับ · TIPS</text>
    <text x="48" y="112" font-size="25" fill="#C8E6D2">🔄  QR ค้าง/ไม่อัปเดต → กด "รีเฟรช QR" ได้เลย</text>
    <text x="48" y="152" font-size="25" fill="#C8E6D2">❓  ลืมขั้นตอน → กด "วิธีใช้ ?" มุมขวาบนของหน้า QR เจ้าหน้าที่</text>
    <text x="48" y="192" font-size="25" fill="#C8E6D2">🔒  อย่าแชร์ภาพ QR ออนไลน์ — ใช้โชว์หน้างานให้นักเรียนสแกนเท่านั้น</text>
  </g>

  <!-- footer -->
  <text x="620" y="1660" font-size="22" fill="#637068" text-anchor="middle">Botty — School Recycling Rewards · บทบาท council ทำได้แค่เปิด QR ยืนยันการสแกน (ปรับคะแนน/จัดการระบบ = admin เท่านั้น)</text>
  <text x="620" y="1700" font-size="20" fill="#9AA8A0" text-anchor="middle">เมื่อ BIN_CONFIRM_MODE = enforce (ค่าเริ่มต้น) คะแนนจะถูกปลดล็อกหลังนักเรียนสแกน QR ของเจ้าหน้าที่เท่านั้น</text>
</svg>
